<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JO CLUB Admin</title><link rel="stylesheet" href="style.css"><style>
body{overflow:auto}.adminWrap{max-width:1280px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}h1{margin:0;color:var(--gold2);font-size:34px}h2{margin:0 0 12px;color:var(--gold);font-size:23px;border-bottom:1px solid #6b5018;padding-bottom:8px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}.panel{padding:16px;margin-bottom:16px}.btnRow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.controls{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.counter{display:grid;grid-template-columns:1fr 70px 70px;align-items:center;gap:8px;background:#101010;border:1px solid #5e4514;border-radius:12px;padding:12px}.counter .label{font-size:17px;color:var(--muted)}.counter .value{font-size:34px;font-weight:900}.smallBtn{height:55px;border:0;border-radius:10px;color:white;font-size:34px;font-weight:900;cursor:pointer}.inputGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}label{display:block;color:var(--gold);font-weight:900;margin-bottom:6px}input{width:100%;background:#111;color:white;border:1px solid #73571d;border-radius:10px;padding:11px;font-size:17px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid #3f300f;padding:8px;text-align:center}.table th{color:var(--gold)}.table input{padding:8px;font-size:15px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.box{text-align:center;padding:14px}.box .k{color:var(--gold)}.box .v{font-size:28px;font-weight:900}.linkBox{display:grid;grid-template-columns:1fr 1fr;gap:10px}a{color:var(--gold2);font-weight:900}@media(max-width:800px){.grid,.controls,.btnRow,.inputGrid,.summary,.linkBox{grid-template-columns:1fr}.adminWrap{padding:12px}h1{font-size:24px}.btn{font-size:16px;padding:13px}}
</style></head><body><div class="adminWrap"><div class="top"><h1>JO CLUB Tournament Director Pro v3｜Firebase後台</h1><div style="color:#5ee36a;font-size:18px">● LIVE</div></div><div class="grid"><div><div class="panel card"><h2>賽事控制</h2><div class="btnRow"><button class="btn green" onclick="start()">▶ 開始</button><button class="btn orange" onclick="pause()">Ⅱ 暫停</button><button class="btn blue" onclick="nextLevel()">▶▶ 下一級</button><button class="btn" onclick="prevLevel()">◀◀ 上一級</button><button class="btn red" onclick="resetTournament()">重置</button></div></div><div class="panel card"><h2>倒計時控制</h2><div class="btnRow"><button class="btn" onclick="addTime(60)">+1 分鐘</button><button class="btn" onclick="addTime(300)">+5 分鐘</button><button class="btn" onclick="addTime(-60)">-1 分鐘</button><button class="btn" onclick="addTime(-300)">-5 分鐘</button><button class="btn" onclick="resetLevelTime()">重設本級</button></div></div><div class="panel card"><h2>玩家 / Rebuy 管理</h2><div class="controls"><div class="counter"><div><div class="label">參賽人數 Entries</div><div class="value" id="entriesV">0</div></div><button class="smallBtn red" onclick="change('entries',-1)">−</button><button class="smallBtn green" onclick="addEntry()">＋</button></div><div class="counter"><div><div class="label">桌上剩餘玩家 Remaining</div><div class="value" id="remainingV">0</div></div><button class="smallBtn red" onclick="change('remaining',-1)">−</button><button class="smallBtn green" onclick="change('remaining',1)">＋</button></div><div class="counter"><div><div class="label">Rebuy 數</div><div class="value" id="rebuyV">0</div></div><button class="smallBtn red" onclick="change('rebuyCount',-1)">−</button><button class="smallBtn green" onclick="change('rebuyCount',1)">＋</button></div><div class="counter"><div><div class="label">快速補碼</div><div class="value">+2</div></div><button class="btn" onclick="change('rebuyCount',1)">+1組</button><button class="btn" onclick="change('rebuyCount',2)">+2組</button></div></div></div><div class="panel card"><h2>後台統計（電視不顯示）</h2><div class="summary"><div class="box card"><div class="k">買入組數</div><div class="v" id="buyGroupsV">0</div></div><div class="box card"><div class="k">總獎池</div><div class="v" id="poolV">0</div></div><div class="box card"><div class="k">均碼</div><div class="v" id="avgV">0</div></div><div class="box card"><div class="k">目前時間</div><div class="v" id="timeV">00:00</div></div></div></div></div><div><div class="panel card"><h2>基本資料</h2><div class="inputGrid"><div><label>賽事名稱</label><input id="eventNameI" oninput="editField('eventName',this.value)"></div><div><label>店名</label><input id="venueNameI" oninput="editField('venueName',this.value)"></div><div><label>起始碼</label><input id="startingStackI" type="number" oninput="editField('startingStack',Number(this.value))"></div><div><label>買入金額</label><input id="buyinAmountI" type="number" oninput="editField('buyinAmount',Number(this.value))"></div><div><label>Rebuy金額</label><input id="rebuyPriceI" type="number" oninput="editField('rebuyPrice',Number(this.value))"></div></div></div><div class="panel card"><h2>盲注結構</h2><table class="table"><thead><tr><th>#</th><th>名稱</th><th>SB</th><th>BB</th><th>Ante</th><th>分鐘</th><th></th></tr></thead><tbody id="levelsBody"></tbody></table><div class="btnRow" style="grid-template-columns:repeat(3,1fr);margin-top:12px"><button class="btn green" onclick="addLevel()">＋新增級別</button><button class="btn blue" onclick="saveLevels()">儲存盲注</button><button class="btn" onclick="loadTurboTemplate()">載入 Turbo</button></div></div><div class="panel card"><h2>連結</h2><div class="linkBox"><div class="card box">電視顯示頁<br><a href="display.html" target="_blank">display.html</a></div><div class="card box">後台控制頁<br><a href="admin.html" target="_blank">admin.html</a></div></div></div></div></div></div><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="firebase.js"></script><script>
let state=null,timer=null;function commit(p){return updateState(p)}function start(){commit({running:true})}function pause(){commit({running:false})}function addTime(sec){commit({secondsLeft:Math.max(0,Number(state.secondsLeft||0)+sec)})}function resetLevelTime(){const l=state.levels[state.levelIndex];commit({secondsLeft:Number(l.minutes||0)*60})}function nextLevel(){if(state.levelIndex<state.levels.length-1){const ni=state.levelIndex+1;commit({levelIndex:ni,secondsLeft:Number(state.levels[ni].minutes||0)*60})}else commit({running:false,secondsLeft:0})}function prevLevel(){if(state.levelIndex>0){const ni=state.levelIndex-1;commit({levelIndex:ni,secondsLeft:Number(state.levels[ni].minutes||0)*60})}}function change(k,d){commit({[k]:Math.max(0,Number(state[k]||0)+d)})}function addEntry(){commit({entries:Number(state.entries||0)+1,remaining:Number(state.remaining||0)+1})}function editField(k,v){commit({[k]:v})}function render(s){state=s;entriesV.textContent=s.entries;remainingV.textContent=s.remaining;rebuyV.textContent=s.rebuyCount;buyGroupsV.textContent=buyGroups(s);poolV.textContent=money(prizePool(s));avgV.textContent=money(averageStack(s));timeV.textContent=formatTime(s.secondsLeft);eventNameI.value=s.eventName;venueNameI.value=s.venueName;startingStackI.value=s.startingStack;buyinAmountI.value=s.buyinAmount;rebuyPriceI.value=s.rebuyPrice;levelsBody.innerHTML="";s.levels.forEach((l,i)=>{const tr=document.createElement("tr");tr.innerHTML=`<td>${i+1}</td><td><input value="${l.name||""}" data-i="${i}" data-k="name"></td><td><input value="${l.smallBlind||""}" data-i="${i}" data-k="smallBlind"></td><td><input value="${l.bigBlind||""}" data-i="${i}" data-k="bigBlind"></td><td><input value="${l.ante||""}" data-i="${i}" data-k="ante"></td><td><input type="number" value="${l.minutes||0}" data-i="${i}" data-k="minutes"></td><td><button class="btn red" onclick="deleteLevel(${i})">刪</button></td>`;levelsBody.appendChild(tr)})}function saveLevels(){const lv=JSON.parse(JSON.stringify(state.levels));levelsBody.querySelectorAll("input").forEach(inp=>{const i=Number(inp.dataset.i),k=inp.dataset.k;lv[i][k]=k==="minutes"?Number(inp.value):inp.value});commit({levels:lv})}function addLevel(){commit({levels:[...state.levels,{name:"新級別",smallBlind:"",bigBlind:"",ante:"",minutes:15}]})}function deleteLevel(i){if(state.levels.length<=1)return alert("至少保留一個級別");const lv=[...state.levels];lv.splice(i,1);commit({levels:lv,levelIndex:Math.min(state.levelIndex,lv.length-1)})}function loadTurboTemplate(){commit({levels:[{name:"第一階段",smallBlind:"1K",bigBlind:"2K",ante:"",minutes:90},{name:"第二階段",smallBlind:"2K",bigBlind:"3K",ante:"",minutes:90}],levelIndex:0,secondsLeft:5400})}function resetTournament(){if(confirm("確定重置整場賽事？"))setState(defaultState)}function runClock(){clearInterval(timer);timer=setInterval(()=>{if(!state||!state.running)return;const ns=Math.max(0,Number(state.secondsLeft||0)-1);if(ns<=0)nextLevel();else commit({secondsLeft:ns})},1000)}ensureState().then(()=>listenState(render));runClock();
</script></body></html>
