<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>JO CLUB Admin</title>
<link rel="stylesheet" href="style.css"/>
<style>
body{overflow:auto}
.adminWrap{max-width:1280px;margin:auto;padding:22px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
h1{margin:0;color:var(--gold2);font-size:36px} h2{margin:0 0 12px;color:var(--gold);font-size:24px;border-bottom:1px solid #6b5018;padding-bottom:8px}
.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}.panel{padding:16px;margin-bottom:16px}
.btnRow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.controls{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.counter{display:grid;grid-template-columns:1fr 70px 70px;align-items:center;gap:8px;background:#101010;border:1px solid #5e4514;border-radius:12px;padding:12px}
.counter .label{font-size:17px;color:var(--muted)}.counter .value{font-size:34px;font-weight:900;color:white}
.smallBtn{height:55px;border:0;border-radius:10px;color:white;font-size:34px;font-weight:900;cursor:pointer}
.inputGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
label{display:block;color:var(--gold);font-weight:900;margin-bottom:6px}
input{width:100%;background:#111;color:white;border:1px solid #73571d;border-radius:10px;padding:11px;font-size:17px}
.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid #3f300f;padding:8px;text-align:center}.table th{color:var(--gold)}
.table input{padding:8px;font-size:15px}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.box{text-align:center;padding:14px}.box .k{color:var(--gold)}.box .v{font-size:30px;font-weight:900}
.linkBox{display:grid;grid-template-columns:1fr 1fr;gap:10px}
a{color:var(--gold2);font-weight:900}
</style>
</head>
<body>
<div class="adminWrap">
  <div class="top">
    <h1>JO CLUB Tournament Director Pro｜後台控制</h1>
    <div style="color:#5ee36a;font-size:18px">● 已連線</div>
  </div>

  <div class="grid">
    <div>
      <div class="panel card">
        <h2>賽事控制</h2>
        <div class="btnRow">
          <button class="btn green" onclick="start()">▶ 開始</button>
          <button class="btn orange" onclick="pause()">Ⅱ 暫停</button>
          <button class="btn blue" onclick="nextLevel()">▶▶ 下一級</button>
          <button class="btn" onclick="prevLevel()">◀◀ 上一級</button>
          <button class="btn red" onclick="resetTournament()">重置</button>
        </div>
      </div>

      <div class="panel card">
        <h2>倒計時控制</h2>
        <div class="btnRow">
          <button class="btn" onclick="addTime(60)">+1 分鐘</button>
          <button class="btn" onclick="addTime(300)">+5 分鐘</button>
          <button class="btn" onclick="addTime(-60)">-1 分鐘</button>
          <button class="btn" onclick="addTime(-300)">-5 分鐘</button>
          <button class="btn" onclick="resetLevelTime()">重設本級</button>
        </div>
      </div>

      <div class="panel card">
        <h2>玩家 / Rebuy 管理</h2>
        <div class="controls">
          <div class="counter"><div><div class="label">參賽人數 Entries</div><div class="value" id="entriesV">0</div></div><button class="smallBtn red" onclick="change('entries',-1)">−</button><button class="smallBtn green" onclick="addEntry()">＋</button></div>
          <div class="counter"><div><div class="label">桌上剩餘玩家 Remaining</div><div class="value" id="remainingV">0</div></div><button class="smallBtn red" onclick="change('remaining',-1)">−</button><button class="smallBtn green" onclick="change('remaining',1)">＋</button></div>
          <div class="counter"><div><div class="label">Rebuy 數</div><div class="value" id="rebuyV">0</div></div><button class="smallBtn red" onclick="change('rebuyCount',-1)">−</button><button class="smallBtn green" onclick="change('rebuyCount',1)">＋</button></div>
          <div class="counter"><div><div class="label">補碼籌碼倍率</div><div class="value" id="rebuyStackV">1</div></div><button class="smallBtn red" onclick="change('rebuyStackUnit',-1)">−</button><button class="smallBtn green" onclick="change('rebuyStackUnit',1)">＋</button></div>
        </div>
      </div>

      <div class="panel card">
        <h2>後台統計（不顯示在電視）</h2>
        <div class="summary">
          <div class="box card"><div class="k">買入組數</div><div class="v" id="buyGroups">0</div></div>
          <div class="box card"><div class="k">總獎池</div><div class="v" id="poolV">0</div></div>
          <div class="box card"><div class="k">均碼</div><div class="v" id="avgV">0</div></div>
          <div class="box card"><div class="k">目前時間</div><div class="v" id="timeV">00:00</div></div>
        </div>
      </div>
    </div>

    <div>
      <div class="panel card">
        <h2>基本資料</h2>
        <div class="inputGrid">
          <div><label>賽事名稱</label><input id="eventNameI" oninput="updateField('eventName',this.value)"></div>
          <div><label>店名</label><input id="venueNameI" oninput="updateField('venueName',this.value)"></div>
          <div><label>起始碼</label><input id="startingStackI" type="number" oninput="updateField('startingStack',Number(this.value))"></div>
          <div><label>買入金額</label><input id="buyinAmountI" type="number" oninput="updateField('buyinAmount',Number(this.value))"></div>
        </div>
      </div>

      <div class="panel card">
        <h2>盲注結構（後台可調整）</h2>
        <table class="table">
          <thead><tr><th>#</th><th>名稱</th><th>SB</th><th>BB</th><th>Ante</th><th>分鐘</th><th></th></tr></thead>
          <tbody id="levelsBody"></tbody>
        </table>
        <div class="btnRow" style="grid-template-columns:repeat(3,1fr);margin-top:12px">
          <button class="btn green" onclick="addLevel()">＋新增級別</button>
          <button class="btn blue" onclick="saveLevels()">儲存盲注</button>
          <button class="btn" onclick="loadTurboTemplate()">載入 22,000 Turbo</button>
        </div>
      </div>

      <div class="panel card">
        <h2>開啟方式</h2>
        <div class="linkBox">
          <div class="card box">電視顯示頁<br><a href="display.html" target="_blank">開啟 display.html</a></div>
          <div class="card box">後台控制頁<br><a href="admin.html" target="_blank">開啟 admin.html</a></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
let state = loadState();
let timer = null;

function commit(){ saveState(state); render(state); }
function start(){ state.running = true; commit(); startLoop(); }
function pause(){ state.running = false; commit(); }
function addTime(sec){ state.secondsLeft = Math.max(0, Number(state.secondsLeft||0) + sec); commit(); }
function resetLevelTime(){ const l=state.levels[state.levelIndex]; state.secondsLeft = Number(l.minutes||0)*60; commit(); }
function nextLevel(){ if(state.levelIndex < state.levels.length - 1){ state.levelIndex++; resetLevelTime(); } else { state.running=false; commit(); } }
function prevLevel(){ if(state.levelIndex > 0){ state.levelIndex--; resetLevelTime(); } }
function change(key, delta){ state[key] = Math.max(0, Number(state[key]||0) + delta); commit(); }
function addEntry(){ state.entries++; state.remaining++; commit(); }
function updateField(key, val){ state[key]=val; commit(); }

function startLoop(){
  clearInterval(timer);
  timer = setInterval(() => {
    if(!state.running) return;
    state.secondsLeft--;
    if(state.secondsLeft <= 0){
      if(state.levelIndex < state.levels.length - 1){
        state.levelIndex++;
        state.secondsLeft = Number(state.levels[state.levelIndex].minutes || 0) * 60;
      } else {
        state.secondsLeft = 0;
        state.running = false;
      }
    }
    commit();
  }, 1000);
}

function render(s){
  state = s;
  entriesV.textContent = s.entries;
  remainingV.textContent = s.remaining;
  rebuyV.textContent = s.rebuyCount;
  rebuyStackV.textContent = s.rebuyStackUnit;
  buyGroups.textContent = totalBuyGroups(s);
  poolV.textContent = money(prizePool(s));
  avgV.textContent = money(averageStack(s));
  timeV.textContent = formatTime(s.secondsLeft);

  eventNameI.value = s.eventName;
  venueNameI.value = s.venueName;
  startingStackI.value = s.startingStack;
  buyinAmountI.value = s.buyinAmount;

  levelsBody.innerHTML = "";
  s.levels.forEach((l,i)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i+1}</td>
      <td><input value="${l.name||""}" data-i="${i}" data-k="name"></td>
      <td><input value="${l.smallBlind||""}" data-i="${i}" data-k="smallBlind"></td>
      <td><input value="${l.bigBlind||""}" data-i="${i}" data-k="bigBlind"></td>
      <td><input value="${l.ante||""}" data-i="${i}" data-k="ante"></td>
      <td><input type="number" value="${l.minutes||0}" data-i="${i}" data-k="minutes"></td>
      <td><button class="btn red" onclick="deleteLevel(${i})">刪</button></td>`;
    levelsBody.appendChild(tr);
  });
}

function saveLevels(){
  const inputs = levelsBody.querySelectorAll("input");
  inputs.forEach(inp=>{
    const i = Number(inp.dataset.i), k = inp.dataset.k;
    state.levels[i][k] = k === "minutes" ? Number(inp.value) : inp.value;
  });
  if(state.levelIndex >= state.levels.length) state.levelIndex = 0;
  commit();
}
function addLevel(){
  state.levels.push({name:"新級別", smallBlind:"", bigBlind:"", ante:"", minutes:15});
  commit();
}
function deleteLevel(i){
  if(state.levels.length <= 1) return alert("至少要保留一個級別");
  state.levels.splice(i,1);
  if(state.levelIndex >= state.levels.length) state.levelIndex = state.levels.length - 1;
  commit();
}
function loadTurboTemplate(){
  state.levels = [
    { name:"第一階段", smallBlind:"1K", bigBlind:"2K", ante:"", minutes:90 },
    { name:"第二階段", smallBlind:"2K", bigBlind:"3K", ante:"", minutes:90 }
  ];
  state.levelIndex = 0;
  state.secondsLeft = 90*60;
  commit();
}
function resetTournament(){
  if(!confirm("確定要重置整場賽事？")) return;
  const keepLevels = state.levels;
  state = {...structuredClone(defaultState), levels: keepLevels};
  commit();
}
subscribeState(render);
render(state);
startLoop();
</script>
</body>
</html>
