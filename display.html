<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JO CLUB Display</title><link rel="stylesheet" href="style.css"><style>
body{overflow:hidden}.screen{height:100vh;padding:28px 34px;display:grid;grid-template-rows:auto 1fr auto;gap:18px}.header{display:grid;grid-template-columns:220px 1fr 260px;align-items:center}.logo{font-size:72px;font-weight:900;color:var(--gold);line-height:.82}.logo span{display:block;font-size:28px;letter-spacing:10px}.title{text-align:center}.title h1{font-size:62px;color:var(--gold2);margin:0}.title h2{font-size:34px;color:var(--gold);margin:8px 0 0}.live{text-align:right;font-size:22px;color:#61d36b}.main{display:grid;grid-template-columns:1fr 340px;gap:18px;min-height:0}.left{display:grid;grid-template-rows:1fr auto;gap:18px}.timerBox{text-align:center;padding:24px}.stage{font-size:34px;color:var(--gold);font-weight:900}.timer{font-size:180px;font-weight:900;letter-spacing:6px;line-height:1.05}.status{font-size:28px;color:var(--gold2);font-weight:800}.paused{color:#ff9f43}.danger{animation:flash .55s infinite}@keyframes flash{50%{color:#ff2f2f;text-shadow:0 0 35px #f00}}.blinds{display:grid;grid-template-columns:1fr 1fr;gap:18px}.blind{text-align:center;padding:18px}.blind .label{font-size:25px;color:var(--gold)}.blind .value{font-size:76px;font-weight:900}.side{padding:18px;overflow:hidden}.side h3{margin:0 0 14px;font-size:26px;color:var(--gold);border-bottom:1px solid rgba(215,170,56,.55);padding-bottom:8px}.levelList{display:flex;flex-direction:column;gap:9px}.levelRow{display:grid;grid-template-columns:60px 1fr 75px;gap:8px;align-items:center;padding:10px;border:1px solid #3b2b0d;border-radius:10px;background:#0a0a0a;font-size:20px}.levelRow.active{background:linear-gradient(90deg,rgba(215,170,56,.35),rgba(215,170,56,.05));border-color:var(--gold)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.stat{text-align:center;padding:18px}.stat .k{font-size:23px;color:var(--gold)}.stat .v{font-size:50px;font-weight:900;margin-top:4px}.footer{display:grid;grid-template-columns:1fr 1fr;gap:18px}.food,.slogan{text-align:center;padding:16px;font-size:34px;color:var(--gold2);font-weight:900;letter-spacing:5px}.slogan{font-size:22px;letter-spacing:1px;color:var(--gold)}
#fullscreenBtn {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  font-size: 28px;
  padding: 14px 26px;
  border-radius: 12px;
  border: none;
  background: #d4af37;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}
</style></head><body><div class="screen"><div class="header"><div class="logo">JO♠<span>CLUB</span></div><div class="title"><h1 id="eventName"></h1><h2 id="venueName"></h2></div><div class="live">● FIREBASE LIVE</div></div><div class="main"><div class="left"><div class="timerBox card"><div class="stage" id="stage"></div><div class="timer" id="timer"></div><div class="status" id="status"></div></div><div class="blinds"><div class="blind card"><div class="label">目前盲注 CURRENT</div><div class="value" id="currentBlind"></div></div><div class="blind card"><div class="label">下一級盲注 NEXT</div><div class="value" id="nextBlind"></div></div></div></div><div class="side card"><h3>盲注結構</h3><div class="levelList" id="levelList"></div></div></div><div><div class="stats"><div class="stat card"><div class="k">參賽人數</div><div class="v" id="entries"></div></div><div class="stat card"><div class="k">剩餘玩家</div><div class="v" id="remaining"></div></div><div class="stat card"><div class="k">REBUY 數</div><div class="v" id="rebuy"></div></div><div class="stat card"><div class="k">均碼 AVG STACK</div><div class="v" id="avgStack"></div></div></div><div class="footer"><div class="food card">全場無限餐飲供應</div><div class="slogan card">速度、效率、戰術。制霸極速賽場！</div></div></div></div><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="firebase.js"></script><script>
function render(s){const level=s.levels[s.levelIndex]||s.levels[0],next=s.levels[s.levelIndex+1];eventName.textContent=s.eventName;venueName.textContent=s.venueName;stage.textContent=`${level.name||"LEVEL "+(s.levelIndex+1)}　${blindText(level)}`;currentBlind.textContent=blindText(level);nextBlind.textContent=next?blindText(next):"FINAL";timer.textContent=formatTime(s.secondsLeft);status.textContent=s.running?"比賽進行中":"已暫停 / 待開始";status.className="status"+(s.running?"":" paused");timer.className="timer"+(s.running&&s.secondsLeft<=10?" danger":"");entries.textContent=s.entries;remaining.textContent=s.remaining;rebuy.textContent=s.rebuyCount;avgStack.textContent=money(averageStack(s));levelList.innerHTML="";s.levels.forEach((l,i)=>{const div=document.createElement("div");div.className="levelRow"+(i===s.levelIndex?" active":"");div.innerHTML=`<b>${i+1}</b><span>${blindText(l)}</span><span>${l.minutes}分</span>`;levelList.appendChild(div);});}ensureState().then(()=>listenState(render));
  

</script></body></html>
